{% extends 'base.html' %}
{% block title %}Ganti Password - FilterIN{% endblock %}

{% block content %}
<div class="main-content" style="max-width: 500px; margin: 40px auto;" data-testid="ganti-password-page">
    <div style="background: var(--surface); padding: 32px; border-radius: var(--radius-md); box-shadow: var(--shadow-md); border: 1px solid var(--border);">
        <h1 style="margin: 0 0 6px 0; font-size: 22px; color: var(--text);">
            <i class="fa-solid fa-key"></i> Ganti Password
        </h1>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 24px;">Password minimal 6 karakter. Akan di-hash sebelum disimpan.</p>

        <form method="POST" action="{{ url_for('ganti_password') }}" data-testid="form-ganti-password">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="qe-form-group">
                <label for="old_password">Password Lama <span class="req" style="color:var(--telkom-red);">*</span></label>
                <input type="password" id="old_password" name="old_password" required data-testid="input-old-password">
            </div>

            <div class="qe-form-group">
                <label for="new_password">Password Baru <span class="req" style="color:var(--telkom-red);">*</span></label>
                <input type="password" id="new_password" name="new_password" required minlength="6" data-testid="input-new-password">
                <small style="color: var(--text-muted); font-size: 11px;">Minimal 6 karakter</small>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <a href="{{ url_for('dashboard') }}" class="qe-btn qe-btn-cancel" style="text-decoration:none;" data-testid="btn-cancel">Kembali</a>
                <button type="submit" class="qe-btn qe-btn-save" style="flex:1;" data-testid="btn-submit-change-password">
                    <i class="fa-solid fa-check"></i> Ganti Password
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
